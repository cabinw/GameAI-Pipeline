<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="326" height="892" viewBox="0 0 326 892" role="img" aria-labelledby="title description">
  <title id="title">Red Cap Target assembled rig acceptance preview</title>
